name: Test Nix Flake

on:
  push:
    branches:
      - main
    paths:
      - 'config/**'
      - 'home-manager/**'
      - 'nix-darwin/**'
      - 'secrets/**'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/flake-tests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'config/**'
      - 'home-manager/**'
      - 'nix-darwin/**'
      - 'secrets/**'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/flake-tests.yml'
  workflow_dispatch:

jobs:
  test-flake:
    name: Test ${{ matrix.machine }}
    runs-on: ${{ matrix.machine }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - machine: macos-26
          - machine: ubuntu-24.04-arm
          - machine: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # nix-quick-install-action is used instead of the Determinate installer
      # because cache-nix-action can only snapshot a store owned by the runner
      # user (single-user install).
      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            experimental-features = nix-command flakes

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-
          gc-max-store-size-linux: 5G

      - name: Check Flake
        run: nix flake check

      - name: Generate build artifacts info
        if: always()
        run: |
          {
            echo "## Flake Test Results"
            echo "- **Machine**: ${{ matrix.machine }}"
            echo "- **Status**: ${{ job.status }}"

            if [[ "${{ job.status }}" == "success" ]]; then
              echo "✅ Configuration builds successfully"
            else
              echo "❌ Configuration failed to build"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
